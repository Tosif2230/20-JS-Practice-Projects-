<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI - Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="heading">BODY MASS INDEX (BIM) Calculator</h1>
      Your height in (cm):
      <input
        id="height"
        type="number"
        value="180"
        class="input"
        placeholder="Enter you hight in cm"
      />
      Your Weight in (kg):
      <input
        id="weight"
        type="number"
        value="80"
        class="input"
        placeholder="Enter your weight in kg"
      />
      <button class="btn" id="btn">Compute BMI</button>
      Your BMI:
      <input disabled type="number" class="input" id="bmi-result" />
      <h4 class="info-text">
        Weight Condition: <span id="weight-condition"></span>
      </h4>
    </div>

    <script src="script.js"></script>
  </body>
</html>
