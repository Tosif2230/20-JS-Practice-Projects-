<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI - Calculator</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="container">
      <h1 class="heading">BODY MASS INDEX (BIM) Calculator</h1>
      Your Hight in (cm)
      <input type="number" class="input" placeholder="Enter you hight in cm" />
      Your Weight in (kg)
      <input type="number" class="input" placeholder="Enter your weight in kg" />
      <button class="btn" id="btn">Compute BMI</button>
      Your BMI:
      <input disabled type="number" class="input" id="bmi-result" />
      <h4 class="text-info">
        Weight Condition: <span id="weight-condition"></span>
      </h4>
    </div>
  </body>
</html>
